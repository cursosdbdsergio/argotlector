// ⭐ FUNCIÓN PRINCIPAL PARA LEER LOS BLOQUES <li>
function leerDatos() {

    const htmlTexto = document.getElementById("codigoHtml").value.trim();

    if (!htmlTexto) {
        alert("Debes pegar uno o más bloques HTML primero.");
        return;
    }

    // Convertimos el texto en DOM real
    const parser = new DOMParser();
    const doc = parser.parseFromString(htmlTexto, "text/html");

    // ⭐ Seleccionamos TODOS los bloques <li>
    const items = doc.querySelectorAll("li");

    if (items.length === 0) {
        alert("No se encontraron elementos <li> en el código.");
        return;
    }

    let salidaFinal  = "";
    //let salidaFinal2 = "";
    let contador     = 0;
    //let terminar     = false; //.. para controlar que solo lea el primero 

    // ⭐ Procesamos cada bloque <li>
    //items.forEach((item) => {
    for (const item of items) {

        // resto de tu código

        // EAN / ISBN-13
        const eanNode = item.querySelector("dd.ean_dc");
        const ean     = eanNode ? eanNode.innerText.trim() : "";
        
        // Autor (justo antes del EAN)
        let autor = "";
        let editorial = "";
        let idioma = "";

        if (eanNode) {
            const ddList = [...item.querySelectorAll("dd")];
            const pos = ddList.indexOf(eanNode);

            autor     = ddList[pos - 1]?.innerText.trim() || "";
            editorial = ddList[pos + 1]?.innerText.trim() || "";
            idioma    = ddList[pos + 2]?.innerText.trim() || "";
        }

        //.. Otros datos
        let   detalles_temporal = item.querySelector(".portada a")?.getAttribute("href") || "";
        const detalles          = "https://www.argot.es" + detalles_temporal;
        const foto              = item.querySelector(".portada img.foto")?.getAttribute("src") || "";
        const titulo            = item.querySelector("dd.title a")?.innerText.trim() || "";
        const descuento         = item.querySelector(".discount")?.innerText.trim() || "";
        const disponibilidad    = item.querySelector("dd.disponibilidad")?.innerText.trim() || "";
        const precioAnterior    = item.querySelector("p.precio strike")?.innerText.trim() || "";
        const precioActual      = item.querySelector("p.precio strong")?.innerText.trim() || "";

        // ⭐ Construimos el bloque de salida solo si detalles_temporal != ""
        if (detalles_temporal !== "") {
            contador++; // aumenta en cada bloque

            salidaFinal += `
                <div class="bloque">
                    <div class="dato"><span>Bloque #${contador}</span></div>
                    <div class="dato"><span>Detalles:</span> ${detalles}</div>
                    <div class="dato"><span>Foto:</span> ${foto}</div>
                    <div class="dato"><span>Título:</span> ${titulo}</div>
                    <div class="dato"><span>Descuento:</span> ${descuento}</div>
                    <div class="dato"><span>EAN / ISBN-13:</span> ${ean}</div>
                    <div class="dato"><span>Autor:</span> ${autor}</div>
                    <div class="dato"><span>Editorial:</span> ${editorial}</div>
                    <div class="dato"><span>Idioma:</span> ${idioma}</div>
                    <div class="dato"><span>Disponibilidad:</span> ${disponibilidad}</div>
                    <div class="dato"><span>Precio anterior:</span> ${precioAnterior}</div>
                    <div class="dato"><span>Precio actual:</span> ${precioActual}</div>
                </div>
            `;
        }

        //if (titulo === "El hombre que compró un automóvil") {
        //    terminar = true;
        //    break;
        //}
       
    };

    //.. Año de edición: <dd itemprop="datePublished">2026</dd>
    //const edicionyear = doc.querySelector('dd[itemprop="datePublished"]')?.innerText.trim() || "";
    //const paginas     = doc.querySelector('dd[itemprop="numberOfPages"]')?.innerText.trim() || "";

    //.. Colección e Ilustración
    //const coleccion   = ddsGenre[2]?.textContent.trim() || "";
    //const ilustracion = ddsGenre[3]?.textContent.trim() || "";

    //.. Sinopsis
    //const sinopsis    = doc.querySelector('#tabsinopsis p[itemprop="description"]')?.textContent.trim() || "";

    //salidaFinal2 += `
    //    <div class="bloque">
    //        <div class="dato"><span>Año de edición:</span> ${edicionyear}</div>
    //        <div class="dato"><span>Páginas:</span>        ${paginas}</div>
    //        <div class="dato"><span>Alto:</span>           ${alto}</div>
    //        <div class="dato"><span>Ancho:</span>          ${ancho}</div>

    //        <div class="dato"><span>Ilustración:</span>    ${sinopsis}</div>
    //    </div>
    //`;

    // ⭐ Mostrar todo en pantalla
    document.getElementById("resultado").innerHTML = salidaFinal; // + salidaFinal2;

}

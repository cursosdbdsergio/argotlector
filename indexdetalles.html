<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<title>Lector de ficha de libro</title>
<style>
    body {
        font-family: Arial, sans-serif;
        margin: 30px;
        background: #f5f5f5;
    }
    textarea {
        width: 100%;
        height: 320px;
        padding: 10px;
        font-size: 14px;
        border-radius: 6px;
        border: 1px solid #ccc;
        resize: vertical;
        background: #fff;
        box-sizing: border-box;
    }
    button {
        margin-top: 10px;
        padding: 12px 20px;
        font-size: 16px;
        background: #0078ff;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
    }
    button:hover {
        background: #005fcc;
    }
    #resultado {
        margin-top: 25px;
        padding: 15px;
        background: white;
        border-radius: 6px;
        border: 1px solid #ccc;
    }
    .dato {
        margin-bottom: 8px;
        font-size: 15px;
    }
    .dato span {
        font-weight: bold;
    }
</style>
</head>
<body>

<h2>Lector de ficha de libro</h2>
<textarea id="codigoHtml" placeholder="Pega aquí el HTML de la ficha del libro"></textarea>
<button onclick="leerDatos()">Leer datos</button>

<div id="resultado"></div>

<script>
function texto(node) {
    return node ? node.textContent.trim() : "";
}

function buscarDtDd(doc, etiqueta) {
    const dts = [...doc.querySelectorAll("dt")];
    const dt = dts.find(el => texto(el).replace(/\s+/g, " ").includes(etiqueta));
    if (!dt) return "";
    let sib = dt.nextElementSibling;
    while (sib) {
        if (sib.tagName === "DD") return texto(sib);
        sib = sib.nextElementSibling;
    }
    return "";
}

function leerDatos() {
    const htmlTexto = document.getElementById("codigoHtml").value.trim();
    if (!htmlTexto) {
        alert("Debes pegar el HTML primero.");
        return;
    }

    const parser = new DOMParser();
    const doc = parser.parseFromString(htmlTexto, "text/html");

    const ficha = doc.querySelector('div[itemtype="https://schema.org/Book"]') || doc.querySelector(".fichaDetalle") || doc;

    const titulo = texto(ficha.querySelector('h1[itemprop="name"]')) || texto(ficha.querySelector("h1"));
    const subtitulo = texto(ficha.querySelector('h4[itemprop="name"]'));
    const autor = texto(ficha.querySelector('p[itemprop="author"] a'));
    const editorial = texto(ficha.querySelector('dd[itemprop="publisher"]')) || texto(ficha.querySelector('dd.editorial'));
    const ean = texto(ficha.querySelector('dd[itemprop="isbn"]'));
    const idioma = buscarDtDd(ficha, "Idioma:");
    const edicionyear = texto(ficha.querySelector('dd[itemprop="datePublished"]')) || buscarDtDd(ficha, "Año de edición:");
    const paginas = texto(ficha.querySelector('dd[itemprop="numberOfPages"]')) || buscarDtDd(ficha, "Páginas:");
    const alto = buscarDtDd(ficha, "Alto:");
    const ancho = buscarDtDd(ficha, "Ancho:");
    const coleccion = buscarDtDd(ficha, "Colección:");
    const encuadernacion = buscarDtDd(ficha, "Encuadernación:");
    const ilustracion = buscarDtDd(ficha, "Ilustración:");
    const sinopsis = texto(ficha.querySelector('p[itemprop="description"]')) || buscarDtDd(ficha, "Sinopsis:");

    const salida = `
        <div class="dato"><span>Título:</span> ${titulo}</div>
        <div class="dato"><span>Subtítulo:</span> ${subtitulo}</div>
        <div class="dato"><span>Autor:</span> ${autor}</div>
        <div class="dato"><span>Editorial:</span> ${editorial}</div>
        <div class="dato"><span>EAN / ISBN:</span> ${ean}</div>
        <div class="dato"><span>Idioma:</span> ${idioma}</div>
        <div class="dato"><span>Año de edición:</span> ${edicionyear}</div>
        <div class="dato"><span>Páginas:</span> ${paginas}</div>
        <div class="dato"><span>Encuadernación:</span> ${encuadernacion}</div>
        <div class="dato"><span>Alto:</span> ${alto}</div>
        <div class="dato"><span>Ancho:</span> ${ancho}</div>
        <div class="dato"><span>Colección:</span> ${coleccion}</div>
        <div class="dato"><span>Ilustración:</span> ${ilustracion}</div>
        <div class="dato"><span>Sinopsis:</span> ${sinopsis}</div>
    `;

    document.getElementById("resultado").innerHTML = salida;
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>

<title>Lector de datos de libro</title>
<style>
    body {
        font-family: Arial, sans-serif;
        margin: 30px;
        background: #f5f5f5;
    }

    h2 {
        margin-bottom: 10px;
    }

    textarea {
        width: 100%;
        height: 320px;
        padding: 10px;
        font-size: 14px;
        border-radius: 6px;
        border: 1px solid #ccc;
        resize: vertical;
        background: #fff;
        box-sizing: border-box;

        background: #0078ff;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
    }

    button:hover {
        background: #005fcc;
    }

    #resultado {
        margin-top: 25px;
        padding: 15px;
        background: white;
        border-radius: 6px;
        border: 1px solid #ccc;
    }

    .bloque {
        margin-bottom: 25px;
        padding-bottom: 15px;
        border-bottom: 2px solid #ddd;
    }

    .dato {
        margin-bottom: 8px;
        font-size: 15px;
    }

    .dato span {
        font-weight: bold;
    }
</style>
</head>
<body>

<h2>Lector de datos desde bloques HTML (Detalles de un libro)</h2>

<textarea id="codigoHtml" placeholder="Pega aquí el HTML completo o varios bloques <li>...</li>"></textarea>
<button onclick="leerDatos()">Leer datos</button>

<div id="resultado"></div>

<script>
function texto(node) {
    return node ? node.textContent.trim() : "";
}

function leerDatos() {

    const htmlTexto = document.getElementById("codigoHtml").value.trim();
    if (!htmlTexto) {
        alert("Debes pegar uno o más bloques HTML primero.");
        return;
    }

    const parser = new DOMParser();
    const doc = parser.parseFromString(htmlTexto, "text/html");

    const items = doc.querySelectorAll("li");
    const raiz = items.length ? items : [doc];

    if (raiz.length === 0) {
        alert("No se encontraron bloques para procesar.");
        return;
    }

    let salidaFinal = "";

    raiz.forEach((item) => {
        const ean = texto(item.querySelector("dd.ean_dc"));
        let autor = "";
        let editorial = "";
        let idioma = "";

        const eanNode = item.querySelector("dd.ean_dc");
        if (eanNode) {
            const ddList = [...item.querySelectorAll("dd")];
            const pos = ddList.indexOf(eanNode);
            autor = texto(ddList[pos - 1]);
            editorial = texto(ddList[pos + 1]);
            idioma = texto(ddList[pos + 2]);
        }

        const detalles_temporal = item.querySelector(".portada a")?.getAttribute("href") || item.querySelector(".portada-detalle a")?.getAttribute("href") || "";
        const detalles = detalles_temporal ? (detalles_temporal.startsWith("http") ? detalles_temporal : "https://www.argot.es" + detalles_temporal) : "";
        const foto = item.querySelector(".portada img.foto")?.getAttribute("src") || item.querySelector("#detportada")?.getAttribute("src") || "";
        const titulo = texto(item.querySelector("dd.title a")) || texto(item.querySelector("h1[itemprop='name']"));
        const descuento = texto(item.querySelector(".discount"));
        const disponibilidad = texto(item.querySelector("dd.disponibilidad"));
        const precioAnterior = texto(item.querySelector("p.precio strike"));
        const precioActual = texto(item.querySelector("p.precio strong"));
        
        if (detalles_temporal !== "" || edicionyear || paginas || sinopsis) {
            contador++;
            salidaFinal += `
                <div class="bloque">
                    <div class="dato"><span>Bloque #${contador}</span></div>
                    <div class="dato"><span>Detalles:</span> ${detalles}</div>
                    <div class="dato"><span>Foto:</span> ${foto}</div>
                    <div class="dato"><span>Título:</span> ${titulo}</div>
                    <div class="dato"><span>Descuento:</span> ${descuento}</div>
                    <div class="dato"><span>EAN / ISBN-13:</span> ${ean}</div>
                    <div class="dato"><span>Autor:</span> ${autor}</div>
                    <div class="dato"><span>Editorial:</span> ${editorial}</div>
                    <div class="dato"><span>Idioma:</span> ${idioma}</div>
                    <div class="dato"><span>Disponibilidad:</span> ${disponibilidad}</div>
                    <div class="dato"><span>Precio anterior:</span> ${precioAnterior}</div>
                    <div class="dato"><span>Precio actual:</span> ${precioActual}</div>
                </div>    
            `;
        }
    });

    //const edicionyear = texto(item.querySelector('dd[itemprop="datePublished"]')) || buscarTextoPorEtiqueta(item, "Año de edición:");

    //const sinopsis       = ""; //texto(item.querySelector('p[itemprop="description"]')) || buscarTextoPorEtiqueta(item, "Sinopsis:");

    //    <div class="dato"><span>Encuadernación:</span> ${encuadernacion}</div>
